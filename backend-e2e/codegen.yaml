schema: ./schema/**/*.graphql
documents:
  - ./test/fragments.graphql
config:
  sort: false
generates:
  ./test/schema.generated.ts:
    config:
      avoidOptionals: true
      scalars:
        GraphQLTimestamp: string
    plugins:
      - typescript
  ./test/operations.generated.ts:
    config:
      avoidOptionals: true
      preResolveTypes: false
      scalars:
        GraphQLTimestamp: string
      enumValues:
        CreditType: ./schema.generated#CreditType
        DatePrecision: ./schema.generated#DatePrecision
        RecordOrder: ./schema.generated#RecordOrder
        SourceType: ./schema.generated#SourceType
        StatusType: ./schema.generated#StatusType
    plugins:
      - typescript-operations:
          enumSuffix: true
      - typed-document-node
