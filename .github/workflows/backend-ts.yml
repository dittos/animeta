name: Backend (TS)

on:
  push:
    branches: [ '*' ]
    paths:
      - 'backend-ts/**'
      - 'backend-e2e/**'
      - 'tooling/**'
      - 'Dockerfile.backend-ts.prebuilt'
      - '.github/workflows/backend-ts.yml'
  pull_request:
    paths: ['backend-ts/**', 'backend-e2e/**', 'tooling/**']

env:
  # change this to test deploy from other branch
  DEPLOY_REF: refs/heads/master

jobs:
  build:

    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: .

    permissions:
      contents: read
      packages: write

    steps:
    - uses: actions/checkout@v4
    
    - name: Install Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 22
    
    - uses: pnpm/action-setup@v4
      name: Install pnpm
      id: pnpm-install
      with:
        version: 11.1.2
        run_install: false

    - name: Get pnpm store directory
      id: pnpm-cache
      run: |
        echo "pnpm_cache_dir=$(pnpm store path)" >> "$GITHUB_OUTPUT"

    - uses: actions/cache@v3
      name: Setup pnpm cache
      with:
        path: ${{ steps.pnpm-cache.outputs.pnpm_cache_dir }}
        key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
        restore-keys: |
          ${{ runner.os }}-pnpm-store-

    - name: Install dependencies
      run: pnpm install --frozen-lockfile

    - run: pnpm -C tooling run build
    - run: pnpm -C backend-ts run prebuild && pnpm -C backend-ts run build
    
    - name: Run unit tests
      run: pnpm -C backend-ts run test

    - name: Run functional tests
      run: |
        pnpm -C backend-ts start:e2e > /tmp/backend-e2e-server.log 2>&1 &
        server_pid=$!
        cleanup() {
          kill "$server_pid" 2>/dev/null || true
          wait "$server_pid" 2>/dev/null || true
        }
        trap cleanup EXIT

        if ! ANIMETA_BASE_URL=http://localhost:8082 ANIMETA_TEST_TOKEN=test-token pnpm -C backend-e2e test; then
          cat /tmp/backend-e2e-server.log
          exit 1
        fi

    # Deploy
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2
    - name: Log in to the Container registry
      uses: docker/login-action@f054a8b539a109f9f41c372932f1ae047eff08c9
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    - name: Build and push
      uses: docker/build-push-action@v4
      with:
        context: .
        file: Dockerfile.backend-ts.prebuilt
        push: ${{ github.event_name == 'push' && github.ref == env.DEPLOY_REF }}
        tags: "ghcr.io/dittos/animeta-backend-ts:latest"
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - uses: azure/setup-kubectl@v3
      if: github.event_name == 'push' && github.ref == env.DEPLOY_REF
    - name: Set up kubeconfig
      if: github.event_name == 'push' && github.ref == env.DEPLOY_REF
      env:
        KUBECONFIG_DATA_BASE64: ${{ secrets.KUBECONFIG_DATA_BASE64 }}
      run: |
        mkdir ~/.kube
        echo $KUBECONFIG_DATA_BASE64 | base64 -d > ~/.kube/config
    - name: Run migration
      if: github.event_name == 'push' && github.ref == env.DEPLOY_REF
      run: npx zx@7 bin/migrate-remote.mjs
    - name: Rollout
      if: github.event_name == 'push' && github.ref == env.DEPLOY_REF
      run: |
        kubectl rollout restart deployment/animeta-backend-ts
        kubectl rollout status deployment/animeta-backend-ts
